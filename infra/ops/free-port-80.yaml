# One-shot: free host port 80 before pedidonamesa nginx binds it.
services:
  ops:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      - sh
      - -c
      - |
        docker ps --format '{{.Names}} {{.Ports}}' | grep ':80->' | awk '{print $1}' | while read c; do
          echo "Stopping $c"
          docker stop "$c"
        done
        echo PORT_80_FREE
    restart: "no"
