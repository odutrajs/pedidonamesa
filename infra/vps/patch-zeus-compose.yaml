services:
  patch:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/zeus-backend:/zeus
    entrypoint:
      - sh
      - -c
      - |
        SRC=/zeus/nginx.live
        test -s "$SRC" || SRC=/zeus/nginx.work
        test -s "$SRC" || SRC=/zeus/nginx.conf
        grep -vE 'proxy_set_header [A-Za-z0-9_-]+ ;$' "$SRC" | awk '
          /server_name.*cardapionamesa/ { skip=1; depth=0 }
          skip {
            if (match($0, /\{/)) depth++
            if (match($0, /\}/)) { depth--; if (depth <= 0) skip=0 }
            next
          }
          { print }
        ' > /zeus/nginx.clean
        ( cat /zeus/nginx.clean
          echo '' | base64 -d
        ) > /zeus/nginx.conf
        wc -l /zeus/nginx.conf
        docker run --rm -v /opt/zeus-backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro nginx:alpine nginx -t
        docker restart zeus-backend-nginx-1
        sleep 5
        docker exec zeus-backend-nginx-1 nginx -t && docker exec zeus-backend-nginx-1 nginx -s reload && echo OK
    restart: "no"
