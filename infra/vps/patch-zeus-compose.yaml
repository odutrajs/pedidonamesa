services:
  patch:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/zeus-backend:/zeus
    entrypoint:
      - sh
      - -c
      - |
        docker inspect zeus-backend-nginx-1 --format '{{range .Mounts}}{{.Source}} -> {{.Destination}} ({{.Mode}}){{println}}{{end}}'
        docker cp zeus-backend-nginx-1:/etc/nginx/conf.d/default.conf /zeus/nginx.work
        ( head -n 88 /zeus/nginx.work
          echo '' | base64 -d
        ) > /zeus/nginx.conf
        wc -l /zeus/nginx.conf
        docker exec zeus-backend-nginx-1 wc -l /etc/nginx/conf.d/default.conf
        docker exec zeus-backend-nginx-1 nginx -t && docker exec zeus-backend-nginx-1 nginx -s reload && echo OK
    restart: "no"
