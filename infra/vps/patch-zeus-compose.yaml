services:
  patch:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/zeus-backend:/zeus
    entrypoint:
      - sh
      - -c
      - |
        grep -n 'proxy_set_header' /zeus/nginx.conf || true
        sed -i -E '/proxy_set_header .* ;$$/d' /zeus/nginx.conf
        sed -i '/server_name cardapionamesa/,/^}/d' /zeus/nginx.conf
        sed -i '/listen 80;$$/{ N; /server_name cardapionamesa/d; }' /zeus/nginx.conf
        if grep -q 'cardapionamesa.com' /zeus/nginx.conf; then
          echo 'cardapionamesa.com ja configurado'
        else
          echo '' | base64 -d >> /zeus/nginx.conf
        fi
        docker exec zeus-backend-nginx-1 nginx -t && docker exec zeus-backend-nginx-1 nginx -s reload && echo OK
    restart: "no"
