services:
  patch:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/zeus-backend:/zeus
    entrypoint:
      - sh
      - -c
      - |
        docker cp zeus-backend-nginx-1:/etc/nginx/conf.d/default.conf /zeus/nginx.live
        grep -vE 'proxy_set_header [^;]+ ;$$' /zeus/nginx.live | awk '
          /^server / { buf=$$0"\n"; inb=1; card=0; next }
          inb { buf=buf $$0"\n"; if(/cardapionamesa/) card=1; if(/^}/) { if(!card) printf "%s",buf; inb=0; buf="" } next }
          { print }
        ' > /zeus/nginx.conf
        if ! grep -q 'cardapionamesa.com' /zeus/nginx.conf; then
          echo '' | base64 -d >> /zeus/nginx.conf
        fi
        docker exec zeus-backend-nginx-1 nginx -t && docker exec zeus-backend-nginx-1 nginx -s reload && echo OK
    restart: "no"
