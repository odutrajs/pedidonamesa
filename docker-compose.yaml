services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pedidonamesa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pedidonamesa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedidonamesa -d pedidonamesa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/odutrajs/pedidonamesa-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: pedidonamesa
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: pedidonamesa
      DB_SYNC: "true"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: pedidonamesa
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"

  web:
    image: ghcr.io/odutrajs/pedidonamesa-web:latest
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: ghcr.io/odutrajs/pedidonamesa-nginx:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
      - web

volumes:
  pgdata:
  redisdata:
  miniodata:
