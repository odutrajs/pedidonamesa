services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pedidonamesa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pedidonamesa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedidonamesa -d pedidonamesa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/odutrajs/pedidonamesa-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: pedidonamesa
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: pedidonamesa
      DB_SYNC: "true"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: pedidonamesa
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      PORT: 3000
      NODE_ENV: production
    expose:
      - "3000"

  web:
    image: ghcr.io/odutrajs/pedidonamesa-web:latest
    restart: unless-stopped
    expose:
      - "80"

  cert-dummy:
    image: alpine:3.20
    volumes:
      - certbot-etc:/etc/letsencrypt
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /etc/letsencrypt/live/cardapionamesa.com-0001
        if [ ! -s /etc/letsencrypt/live/cardapionamesa.com-0001/fullchain.pem ]; then
          apk add --no-cache openssl
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout /etc/letsencrypt/live/cardapionamesa.com-0001/privkey.pem \
            -out /etc/letsencrypt/live/cardapionamesa.com-0001/fullchain.pem \
            -subj "/CN=cardapionamesa.com"
        fi
    restart: "no"

  nginx:
    image: ghcr.io/odutrajs/pedidonamesa-nginx:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      cert-dummy:
        condition: service_completed_successfully
      api:
        condition: service_started
      web:
        condition: service_started
      minio:
        condition: service_started

  certbot-init:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      nginx:
        condition: service_started
    entrypoint:
      - sh
      - -c
      - |
        sleep 8
        certbot certonly --webroot -w /var/www/certbot \
          -d cardapionamesa.com -d www.cardapionamesa.com \
          --email "$$CERTBOT_EMAIL" --agree-tos --non-interactive --keep-until-expiring \
          || echo "certbot init skipped or failed"
        exit 0
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    restart: "no"

  certbot-renew:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint:
      - sh
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot
          sleep 12h & wait $${!}
        done

  nginx-reload:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      certbot-init:
        condition: service_completed_successfully
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    entrypoint:
      - sh
      - -c
      - |
        if ! docker run --rm -v pedidonamesa_certbot-etc:/etc/letsencrypt:ro alpine test -s /etc/letsencrypt/live/cardapionamesa.com-0001/fullchain.pem; then
          docker run --rm -v pedidonamesa_certbot-etc:/etc/letsencrypt -v pedidonamesa_certbot-www:/var/www/certbot \
            certbot/certbot certonly --webroot -w /var/www/certbot \
            -d cardapionamesa.com -d www.cardapionamesa.com \
            --email "$CERTBOT_EMAIL" --agree-tos --non-interactive
        fi
        docker exec pedidonamesa-nginx-1 nginx -s reload && echo OK
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
  certbot-etc:
  certbot-www:
