name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/odutrajs/pedidonamesa-api:latest

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/odutrajs/pedidonamesa-web:latest

      - name: Build and push Nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx.Dockerfile
          push: true
          tags: ghcr.io/odutrajs/pedidonamesa-nginx:latest

      - name: Make GHCR packages public
        run: |
          gh api "/user/packages?package_type=container" || true
          for pkg in pedidonamesa-api pedidonamesa-web pedidonamesa-nginx; do
            gh api --method PATCH "/user/packages/container/${pkg}" \
              --input - <<< '{"visibility":"public"}' || \
            gh api --method PUT "/user/packages/container/${pkg}" \
              -f visibility=public || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hostinger VPS
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          HOSTINGER_VM_ID: ${{ vars.HOSTINGER_VM_ID }}
          PROJECT_NAME: pedidonamesa
          COMPOSE_PATH: docker-compose.yaml
        run: bash .github/scripts/deploy-hostinger.sh

      - name: Verify containers are running
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
          HOSTINGER_VM_ID: ${{ vars.HOSTINGER_VM_ID }}
          PROJECT_NAME: pedidonamesa
        run: |
          API_BASE="https://developers.hostinger.com/api/vps/v1"
          CONTAINERS=$(curl -sS \
            -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
            "${API_BASE}/virtual-machines/${HOSTINGER_VM_ID}/docker/${PROJECT_NAME}/containers")

          echo "$CONTAINERS" | jq -r '.[] | "\(.name): \(.state)"'

          for service in pedidonamesa-api-1 pedidonamesa-web-1 pedidonamesa-nginx-1; do
            STATE=$(echo "$CONTAINERS" | jq -r --arg name "$service" '.[] | select(.name == $name) | .state')
            if [ "$STATE" != "running" ]; then
              echo "Container $service is not running (state: ${STATE:-missing})"
              exit 1
            fi
          done

          echo "Core containers are running"
