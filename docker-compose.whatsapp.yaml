# Compose separado — NÃO incluir no deploy principal da Hostinger.
# Uso: docker compose -f docker-compose.whatsapp.yaml up -d

services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: apps/whatsapp-bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.whatsapp
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - whatsapp_auth:/app/apps/whatsapp-bot/auth
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp_auth:
