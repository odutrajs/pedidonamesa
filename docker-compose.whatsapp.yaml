# Compose separado — NÃO incluir no deploy principal da Hostinger.
# Local:  docker compose -f docker-compose.whatsapp.yaml --env-file .env.whatsapp up -d
# Hostinger: projeto pedidonamesa-whatsapp (deploy via CI)

services:
  whatsapp-bot:
    image: ghcr.io/odutrajs/pedidonamesa-whatsapp-bot:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      RESTAURANT_SLUG: ${RESTAURANT_SLUG}
      API_BASE_URL: ${API_BASE_URL}
      WHATSAPP_BOT_API_KEY: ${WHATSAPP_BOT_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      BAILEYS_AUTH_DIR: ./auth
      CONFIG_REFRESH_MS: ${CONFIG_REFRESH_MS:-60000}
      HANDOFF_MINUTES: ${HANDOFF_MINUTES:-30}
      HTTP_PORT: 3001
      SESSION_TTL_MS: ${SESSION_TTL_MS:-1800000}
      MAX_CONVERSATION_HISTORY: ${MAX_CONVERSATION_HISTORY:-6}
      MAX_MESSAGES_PER_MINUTE: ${MAX_MESSAGES_PER_MINUTE:-8}
      DUPLICATE_MESSAGE_WINDOW_MS: ${DUPLICATE_MESSAGE_WINDOW_MS:-15000}
      MAX_CONSECUTIVE_BOT_REPLIES: ${MAX_CONSECUTIVE_BOT_REPLIES:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - whatsapp_auth:/app/apps/whatsapp-bot/auth
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whatsapp_auth:
